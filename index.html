<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <title>ATC Card</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
    }
    #root {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid #222;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"><div class="spinner"></div></div>
<script>
const API = 'https://tpmqqrpdlqochcctqeqy.supabase.co/functions/v1/card-page';

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(d) {
  const s = Math.floor((Date.now() - new Date(d)) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 2592000) return Math.floor(s/86400) + 'd ago';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

function avatar(url, name, size) {
  size = size || 28;
  if (url) return '<img src="' + esc(url) + '" style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;object-fit:cover;" alt=""/>';
  var i = ((name || '?')[0]).toUpperCase();
  return '<span style="display:inline-flex;align-items:center;justify-content:center;width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:#1e1e1e;font-size:' + Math.round(size*0.45) + 'px;font-weight:600;color:#aaa;">' + esc(i) + '</span>';
}

function render(data) {
  var card = data.card;
  var updates = data.updates || [];
  var trades = data.trades || [];
  document.title = card.title + ' — ATC';

  var imgHtml = card.image_url
    ? '<img src="' + esc(card.image_url) + '" style="width:100%;height:100%;object-fit:cover;display:block;" alt=""/>'
    : '<span style="font-size:13px;color:#555;">No image yet</span>';

  var creator = card.creator || {};
  var owner = card.current_owner || {};
  var ownerHtml = creator.username !== owner.username ? (
    '<div>' +
    '<div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#555;margin-bottom:5px;">Current Owner</div>' +
    '<div style="display:flex;align-items:center;gap:8px;">' + avatar(owner.avatar_url, owner.username) +
    '<span style="font-size:14px;font-weight:600;">@' + esc(owner.username || '?') + '</span></div></div>'
  ) : '';

  var items = [];
  updates.forEach(function(u) {
    items.push({ date: u.created_at, html:
      '<div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #1e1e1e;">' +
      '<div style="flex-shrink:0;">' + avatar(u.user && u.user.avatar_url, u.user && u.user.username, 34) + '</div>' +
      '<div style="flex:1;min-width:0;">' +
      '<span style="font-size:13px;font-weight:700;">@' + esc((u.user && u.user.username) || '?') + '</span>' +
      '<span style="font-size:13px;color:#888;"> added an update</span>' +
      '<span style="display:block;font-size:11px;color:#555;margin-top:2px;">' + timeAgo(u.created_at) + '</span>' +
      (u.description ? '<p style="font-size:13px;color:#888;margin-top:6px;line-height:1.5;">' + esc(u.description) + '</p>' : '') +
      (u.image_url ? '<img src="' + esc(u.image_url) + '" style="display:block;width:100%;border-radius:8px;margin-top:10px;aspect-ratio:2.5/3.5;object-fit:cover;" alt=""/>' : '') +
      '</div></div>'
    });
  });
  trades.forEach(function(t) {
    var from = t.from_user || {};
    var to = t.to_user || {};
    items.push({ date: t.traded_at, html:
      '<div style="display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #1e1e1e;">' +
      '<div style="flex-shrink:0;">' + avatar(from.avatar_url, from.username, 34) + '</div>' +
      '<div style="flex:1;min-width:0;">' +
      '<span style="font-size:13px;font-weight:700;">@' + esc(from.username || '?') + '</span>' +
      '<span style="font-size:13px;color:#888;"> traded to </span>' +
      '<span style="font-size:13px;font-weight:700;">@' + esc(to.username || '?') + '</span>' +
      '<span style="display:block;font-size:11px;color:#555;margin-top:2px;">' + timeAgo(t.traded_at) + '</span>' +
      (t.description ? '<p style="font-size:13px;color:#888;margin-top:6px;line-height:1.5;">' + esc(t.description) + '</p>' : '') +
      (t.image_url ? '<img src="' + esc(t.image_url) + '" style="display:block;width:100%;border-radius:8px;margin-top:10px;aspect-ratio:2.5/3.5;object-fit:cover;" alt=""/>' : '') +
      '</div></div>'
    });
  });
  items.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
  var actHtml = items.length > 0
    ? items.map(function(i) { return i.html; }).join('')
    : '<p style="font-size:14px;color:#555;padding:16px 0;">No activity yet.</p>';

  document.getElementById('root').innerHTML =
    '<div style="max-width:480px;margin:0 auto;padding-bottom:40px;">' +

    '<div style="padding:20px 20px 0;">' +
    '<span style="font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#555;">Artist Trading Cards</span>' +
    '</div>' +

    '<div style="padding:24px 20px 0;">' +
    '<div style="width:100%;max-width:300px;margin:0 auto 24px;aspect-ratio:2.5/3.5;border-radius:14px;overflow:hidden;background:#1e1e1e;display:flex;align-items:center;justify-content:center;">' +
    imgHtml + '</div></div>' +

    '<div style="padding:0 20px 24px;">' +
    '<h1 style="font-size:26px;font-weight:700;line-height:1.2;letter-spacing:-.3px;margin-bottom:8px;">' + esc(card.title) + '</h1>' +
    (card.description ? '<p style="font-size:15px;color:#888;line-height:1.6;margin-bottom:20px;">' + esc(card.description) + '</p>' : '') +
    '<div style="display:flex;gap:24px;padding:16px 0;border-top:1px solid #1e1e1e;border-bottom:1px solid #1e1e1e;">' +
    '<div>' +
    '<div style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#555;margin-bottom:5px;">Creator</div>' +
    '<div style="display:flex;align-items:center;gap:8px;">' + avatar(creator.avatar_url, creator.username) +
    '<span style="font-size:14px;font-weight:600;">@' + esc(creator.username || '?') + '</span></div></div>' +
    ownerHtml +
    '</div></div>' +

    '<div style="padding:24px 20px 0;">' +
    '<div style="font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#555;margin-bottom:16px;">Activity</div>' +
    actHtml + '</div>' +

    '<div style="padding:40px 20px 24px;text-align:center;font-size:11px;color:#555;">ATC &middot; ' + new Date().getFullYear() + '</div>' +
    '</div>';
}

async function load() {
  var id = new URLSearchParams(window.location.search).get('id');
  if (!id) {
    document.getElementById('root').innerHTML = '<div style="text-align:center;padding:40px;"><h2 style="margin-bottom:8px;">No card ID</h2><p style="color:#555;font-size:14px;">Check the URL.</p></div>';
    return;
  }
  try {
    var res = await fetch(API + '?id=' + encodeURIComponent(id));
    var data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Not found');
    render(data);
  } catch(e) {
    document.getElementById('root').innerHTML = '<div style="text-align:center;padding:40px;"><h2 style="margin-bottom:8px;">Card not found</h2><p style="color:#555;font-size:14px;">' + esc(e.message) + '</p></div>';
  }
}

load();
</script>
</body>
</html>
